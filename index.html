<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Leitor de JSON API</title>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: Arial, sans-serif;
			}

			body {
				background: linear-gradient(135deg, #1e3c72, #2a5298);
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
			}

			.container {
				background: white;
				width: 100%;
				max-width: 700px;
				padding: 30px;
				border-radius: 15px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
			}

			h1 {
				text-align: center;
				margin-bottom: 25px;
				color: #1e3c72;
			}

			.form-group {
				margin-bottom: 20px;
			}

			label {
				display: block;
				margin-bottom: 8px;
				font-weight: bold;
				color: #333;
			}

			input {
				width: 100%;
				padding: 12px;
				border: 2px solid #ccc;
				border-radius: 8px;
				font-size: 16px;
			}

			input:focus {
				outline: none;
				border-color: #2a5298;
			}

			button {
				width: 100%;
				padding: 14px;
				border: none;
				border-radius: 8px;
				background: #2a5298;
				color: white;
				font-size: 16px;
				cursor: pointer;
				transition: 0.3s;
			}

			button:hover {
				background: #1e3c72;
			}

			.resultado {
				margin-top: 25px;
				background: #f4f4f4;
				padding: 20px;
				border-radius: 10px;
				overflow-x: auto;
			}

			pre {
				white-space: pre-wrap;
				word-wrap: break-word;
				color: #222;
			}

			.erro {
				color: red;
				margin-top: 15px;
				text-align: center;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Leitor de JSON API</h1>

			<div class="form-group">
				<label for="apiUrl">Link da API</label>
				<input
					type="text"
					id="apiUrl"
					placeholder="https://api.exemplo.com/dados"
				/>
			</div>

			<button onclick="buscarJSON()">Buscar JSON</button>

			<div id="erro" class="erro"></div>

			<div class="resultado">
				<pre id="resultado">
O conteúdo JSON aparecerá aqui...
      </pre
				>
			</div>
		</div>

		<script>
			async function buscarJSON() {
				const apiUrl = document.getElementById("apiUrl").value;
				const resultado = document.getElementById("resultado");
				const erro = document.getElementById("erro");

				erro.innerText = "";
				resultado.innerText = "Carregando...";

				try {
					const response = await fetch(apiUrl);

					if (!response.ok) {
						throw new Error("Erro ao acessar a API");
					}

					const data = await response.json();

					resultado.innerText = JSON.stringify(data, null, 2);
				} catch (e) {
					resultado.innerText = "";
					erro.innerText = e.message;
				}
			}
		</script>
	</body>
</html>
